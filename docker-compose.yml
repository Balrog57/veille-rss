name: veille
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: veille-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - OLLAMA_URL=http://ai-stack-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
      - TZ=Europe/Paris
      - DATABASE_PATH=/app/data/veille.sqlite
      - APP_PASSWORD=${APP_PASSWORD:?APP_PASSWORD is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
    networks:
      - default
      - ai_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: veille-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - default

x-casaos:
  author: self
  category: News
  hostname: 192.168.1.98
  icon: http://192.168.1.98:3000/veille-rss.png
  index: /
  is_uncontrolled: false
  main: frontend
  port_map: "3000"
  scheme: http
  store_app_id: veille
  title:
    custom: "Veille RSS"
    en_us: "Veille RSS"

networks:
  default:
    name: veille_default
  ai_net:
    name: ai_net
    external: true
